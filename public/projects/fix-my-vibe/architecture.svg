  <text x="104" y="179" font-size="12" font-weight="400" fill="#6B7280">MCP server</text>
  <!-- Card B: CLI -->
  <rect x="48" y="200" width="248" height="54" rx="12" fill="#FBFCFD" stroke="#E1E6EC"/>
  <rect x="62" y="212" width="30" height="30" rx="8" fill="#21262E"/>
  <text x="77" y="232" font-size="15" font-weight="700" fill="#D9F2E1" text-anchor="middle">&#10095;</text>
  <text x="104" y="223" font-size="14" font-weight="600" fill="#171A21">fix-my-vibe</text>
  <text x="104" y="241" font-size="12" font-weight="400" fill="#6B7280">CLI</text>

  <!-- arrow 1 -->
  <text x="318" y="205" font-size="30" font-weight="400" fill="#9AA0A8" text-anchor="middle">&#8594;</text>

