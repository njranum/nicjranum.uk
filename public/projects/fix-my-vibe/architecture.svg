    <rect x="411" y="206" width="74" height="24" rx="12" fill="#E9F0FE" stroke="#337AE6"/>
    <text x="448" y="222" font-size="11.5" font-weight="600" fill="#1C54B6" text-anchor="middle">Research</text>
    <rect x="492" y="206" width="46" height="24" rx="12" fill="#FEF6DB" stroke="#DB9E1A"/>
    <text x="515" y="222" font-size="11.5" font-weight="600" fill="#8A6100" text-anchor="middle">Plan</text>
