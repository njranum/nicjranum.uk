  <text x="920" y="190" font-size="10" font-weight="600" letter-spacing="0.3" fill="#0078D4" text-anchor="middle">grounds</text>
  <text x="920" y="212" font-size="24" font-weight="400" fill="#8CB6E0" text-anchor="middle">&#8672;</text>

  <!-- ==== Foundry IQ ==== -->
  <rect x="940" y="138" width="252" height="116" rx="14" fill="#EDF6FE" stroke="#A2CFF2"/>
  <rect x="956" y="154" width="34" height="34" rx="9" fill="#0078D4"/>
  <text x="973" y="176" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">IQ</text>
  <text x="1002" y="166" font-size="15" font-weight="600" fill="#171A21">Foundry IQ</text>
  <text x="1002" y="183" font-size="12" font-weight="400" fill="#6B7280">Azure AI Search</text>
  <text x="956" y="211" font-size="12.5" font-weight="400" fill="#47535C">Grounds every fix in a real source —</text>
  <text x="956" y="228" font-size="12.5" font-weight="400" fill="#47535C">OWASP · CWE · NIST — with a Tavily</text>
  <text x="956" y="245" font-size="12.5" font-weight="400" fill="#47535C">web-search fallback.</text>

  <!-- Legend -->
