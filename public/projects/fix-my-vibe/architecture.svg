  <rect x="430" y="292" width="13" height="13" rx="4" fill="#E9F0FE" stroke="#337AE6"/>
  <text x="450" y="302" font-size="12" font-weight="400" fill="#59606B">LLM reasoning — Foundry mode</text>
  <rect x="700" y="292" width="13" height="13" rx="4" fill="#FEF6DB" stroke="#DB9E1A"/>
  <text x="720" y="302" font-size="12" font-weight="400" fill="#59606B">both</text>
