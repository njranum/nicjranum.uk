  <!-- Title -->
  <text x="48" y="62" font-size="30" font-weight="700" fill="#171A21">Fix My Vibe</text>
  <text x="48" y="90" font-size="15.5" font-weight="400" fill="#6B7280">One deterministic engine · two front doors · grounded by Foundry IQ</text>

  <!-- Zone labels -->
