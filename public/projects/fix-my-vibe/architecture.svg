  <text x="404" y="183" font-size="12" font-weight="400" fill="#6B7280">pure Python · runs offline in both modes</text>

  <!-- pills -->
  <g>
    <rect x="358" y="206" width="46" height="24" rx="12" fill="#E6F5E9" stroke="#3CA057"/>
