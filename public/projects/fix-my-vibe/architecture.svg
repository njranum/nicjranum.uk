  <!-- Card A: Claude Code -->
  <rect x="48" y="138" width="248" height="54" rx="12" fill="#FBFCFD" stroke="#E1E6EC"/>
  <rect x="62" y="150" width="30" height="30" rx="8" fill="#F5EEE0"/>
  <g transform="translate(67,155) scale(0.8333)"><path fill="#191919" d="M17.3041 3.541h-3.6718l6.696 16.918H24Zm-10.6082 0L0 20.459h3.7442l1.3693-3.5527h7.0052l1.3693 3.5528h3.7442L10.5363 3.5409Zm-.3712 10.2232 2.2914-5.9456 2.2914 5.9456Z"/></g>
