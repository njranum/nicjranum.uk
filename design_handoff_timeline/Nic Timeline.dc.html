<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<style>
*{box-sizing:border-box}
html{scroll-snap-type:y proximity}
body{margin:0;background:#fff;-webkit-font-smoothing:antialiased;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
a{color:#0a0a0a;text-decoration:none}
a:hover{color:var(--accent)}
@keyframes tlbob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
</style>
</helmet>
<div ref="{{ rootRef }}" style="--accent:#4f46e5;position:relative;background:#fff;color:#0a0a0a;overflow-x:hidden">

  <nav style="position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:22px 46px;backdrop-filter:blur(6px);background:rgba(255,255,255,0.72)">
    <a href="#top" style="font:700 19px/1 'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:-0.01em">Nic <span style="font-weight:800">Ranum</span></a>
    <div style="display:flex;gap:30px;font:500 15px/1 'Helvetica Neue',Helvetica,Arial,sans-serif">
      <a href="#top">Home</a>
      <a href="#top">Ask</a>
      <a href="#top">Projects</a>
      <a href="#top">CV</a>
      <a href="#top">Contact</a>
    </div>
  </nav>

  <section id="top" style="position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 46px 150px;background-image:radial-gradient(circle, rgba(0,0,0,0.11) 1px, transparent 1.4px);background-size:24px 24px">
    <div style="position:absolute;top:96px;right:46px;display:flex;align-items:center;gap:9px;border:1px solid rgba(0,0,0,0.16);border-radius:999px;padding:9px 17px;font:500 14px/1 ui-monospace,'SF Mono',Menlo,monospace;background:#fff">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></span>Available for work
    </div>
    <h1 style="margin:0;font-weight:800;font-size:clamp(84px,19vw,300px);line-height:0.82;letter-spacing:-0.045em">Nic<br><span style="color:var(--accent)">Ranum</span></h1>
    <p style="margin:34px 0 0;max-width:640px;font:400 clamp(19px,2.2vw,27px)/1.45 'Helvetica Neue',Helvetica,Arial,sans-serif;color:#3a3a3a;text-wrap:pretty">Software engineer. A quick look back — how I got from a Canterbury lecture theatre to job-hunting in London.</p>

    <button onClick="{{ scrollTo }}" style="position:absolute;left:50%;bottom:38px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;background:none;border:none;cursor:pointer;padding:8px;color:#0a0a0a">
      <span style="font:600 13px/1 ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.14em;text-transform:uppercase">View Nic's Timeline</span>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="animation:tlbob 1.6s ease-in-out infinite"><polyline points="5 9 12 16 19 9"></polyline></svg>
    </button>
  </section>

  <div data-tlwrap style="position:relative;padding:14vh 0 20vh;max-width:1180px;margin:0 auto">
    <div style="position:absolute;left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);background:rgba(0,0,0,0.1)"></div>
    <div data-progress style="position:absolute;left:50%;top:0;width:2px;height:0;transform:translateX(-50%);background:var(--accent)"></div>
    <div data-ruler style="position:absolute;left:0;top:0;right:0;bottom:0;pointer-events:none;z-index:0"></div>

    <sc-for list="{{ entries }}" as="item" hint-placeholder-count="4">
      <div data-entry data-side="{{ item.side }}" data-ym="{{ item.ym }}" style="{{ item.rowStyle }}">
        <div style="{{ item.cellStyle }}">
          <div data-card style="background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:16px;padding:26px 30px;max-width:440px;box-shadow:0 1px 2px rgba(0,0,0,0.05);will-change:transform,opacity,filter">
            <div style="{{ item.dateStyle }}">{{ item.date }}</div>
            <h3 style="margin:0 0 15px;font:700 23px/1.22 'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:-0.012em;color:#0a0a0a;text-wrap:pretty">{{ item.title }}</h3>
            <ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px">
              <sc-for list="{{ item.bullets }}" as="b" hint-placeholder-count="3">
                <li style="position:relative;padding-left:20px;font:400 15px/1.5 'Helvetica Neue',Helvetica,Arial,sans-serif;color:#4a4a4a;text-wrap:pretty">
                  <span style="position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--accent)"></span>{{ b }}
                </li>
              </sc-for>
            </ul>
          </div>
        </div>
        <div style="grid-column:2;position:relative;z-index:3;display:flex;justify-content:center;align-items:center;scroll-snap-align:center">
          <div style="position:absolute;left:50%;top:50%;width:26px;height:2px;transform:translate(-50%,-50%);background:rgba(0,0,0,0.28)"></div>
          <div data-dot style="position:relative;width:17px;height:17px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,0.28);transition:background .35s,border-color .35s,box-shadow .35s"></div>
        </div>
      </div>
    </sc-for>
  </div>

  <footer style="text-align:center;padding:60px 20px 90px;border-top:1px solid rgba(0,0,0,0.08)">
    <div style="font:600 13px/1 ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.12em;text-transform:uppercase;color:#9a9a9a">Nic Ranum — nicjranum.uk</div>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4f46e5&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#4f46e5&quot;,&quot;#0a0a0a&quot;,&quot;#e5484d&quot;,&quot;#0ea5e9&quot;]},&quot;snapScroll&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Scroll&quot;},&quot;focusContrast&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.75,&quot;min&quot;:0.3,&quot;max&quot;:0.95,&quot;step&quot;:0.05,&quot;unit&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Scroll&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.rootRef = React.createRef();
    this._raf = null;
  }
  get accent(){ return this.props.accent || '#4f46e5'; }

  componentDidMount(){
    this.tick = () => { this._raf = null; this.update(); };
    this._scroll = () => { if(!this._raf) this._raf = requestAnimationFrame(this.tick); };
    this._resize = () => { clearTimeout(this._rt); this._rt = setTimeout(() => { this.buildRuler(); this.update(); }, 150); };
    window.addEventListener('scroll', this._scroll, {passive:true});
    window.addEventListener('resize', this._resize, {passive:true});
    this.applyTheme();
    this.buildRuler();
    this.update();
    setTimeout(() => { this.buildRuler(); this.update(); }, 300);
  }
  componentDidUpdate(){ this.applyTheme(); this.buildRuler(); this.update(); }
  componentWillUnmount(){
    window.removeEventListener('scroll', this._scroll);
    window.removeEventListener('resize', this._resize);
  }

  buildRuler(){
    const root = this.rootRef.current; if(!root) return;
    const wrap = root.querySelector('[data-tlwrap]');
    const ruler = root.querySelector('[data-ruler]');
    if(!wrap || !ruler) return;
    ruler.innerHTML = '';
    const MON = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const wrapTop = wrap.getBoundingClientRect().top + window.scrollY;
    const els = Array.prototype.slice.call(root.querySelectorAll('[data-entry]'));
    const centerY = (el) => { const d = el.querySelector('[data-dot]'); const r = d.getBoundingClientRect(); return r.top + window.scrollY - wrapTop + r.height/2; };
    for(let i=0; i<els.length-1; i++){
      const mNew = +els[i].getAttribute('data-ym');
      const mOld = +els[i+1].getAttribute('data-ym');
      const yNew = centerY(els[i]);
      const yOld = centerY(els[i+1]);
      const dm = mNew - mOld;
      if(dm <= 0) continue;
      const ppm = Math.abs(yOld - yNew) / dm;
      for(let mi = mOld+1; mi < mNew; mi++){
        const frac = (mi - mOld) / dm;
        const y = yOld + (yNew - yOld) * frac;
        const month = ((mi - 1) % 12) + 1;
        const year = Math.floor((mi - 1) / 12);
        const isJan = month === 1;
        this.addTick(ruler, y, isJan, isJan ? String(year) : (MON[month] + " '" + String(year).slice(2)), isJan || ppm >= 26);
      }
    }
  }

  addTick(ruler, y, big, label, showLabel){
    const t = document.createElement('div');
    t.style.cssText = `position:absolute;top:${y}px;left:50%;transform:translate(-50%,-50%);height:${big?2:1}px;width:${big?30:16}px;background:${big?'rgba(0,0,0,0.34)':'rgba(0,0,0,0.15)'}`;
    ruler.appendChild(t);
    if(showLabel){
      const l = document.createElement('div');
      l.textContent = label;
      l.style.cssText = `position:absolute;top:${y}px;transform:translateY(-50%);white-space:nowrap;font-family:ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.06em;`
        + (big
          ? `right:calc(50% + 26px);text-align:right;font-weight:700;font-size:13px;color:rgba(0,0,0,0.5)`
          : `left:calc(50% + 26px);text-align:left;font-weight:500;font-size:10px;color:rgba(0,0,0,0.3)`);
      ruler.appendChild(l);
    }
  }

  applyTheme(){
    const root = this.rootRef.current; if(!root) return;
    root.style.setProperty('--accent', this.accent);
    document.documentElement.style.scrollSnapType = (this.props.snapScroll === false) ? 'none' : 'y proximity';
  }

  hexA(hex, a){
    const h = hex.replace('#','');
    const f = h.length === 3 ? h.split('').map(c=>c+c).join('') : h;
    const n = parseInt(f, 16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
  }

  update(){
    const root = this.rootRef.current; if(!root) return;
    const vh = window.innerHeight, mid = vh/2, accent = this.accent;
    const minO = 1 - (this.props.focusContrast ?? 0.75);
    root.querySelectorAll('[data-entry]').forEach(el => {
      const dm0 = el.querySelector('[data-dot]');
      const r = (dm0 || el).getBoundingClientRect();
      const c = r.top + r.height/2;
      const norm = Math.min(Math.abs(c - mid) / (vh*0.55), 1);
      const f = 1 - norm;
      const e = f*f*(3 - 2*f);
      el.style.opacity = (minO + (1-minO)*e).toFixed(3);
      const card = el.querySelector('[data-card]');
      const side = el.getAttribute('data-side') === 'left' ? -1 : 1;
      if(card){
        card.style.transform = `translateX(${(side*(1-e)*42).toFixed(1)}px) scale(${(0.94+0.06*e).toFixed(3)})`;
        card.style.filter = `blur(${((1-e)*1.8).toFixed(2)}px)`;
      }
      const dot = el.querySelector('[data-dot]');
      const on = e > 0.55;
      if(dot){
        dot.style.transform = `scale(${(0.75+0.55*e).toFixed(2)})`;
        dot.style.background = on ? accent : '#fff';
        dot.style.borderColor = on ? accent : 'rgba(0,0,0,0.28)';
        dot.style.boxShadow = on ? `0 0 0 7px ${this.hexA(accent,0.13)}` : 'none';
      }
    });
    const wrap = root.querySelector('[data-tlwrap]');
    const prog = root.querySelector('[data-progress]');
    if(wrap && prog){
      const wr = wrap.getBoundingClientRect();
      const filled = Math.min(Math.max(mid - wr.top, 0), wr.height);
      prog.style.height = filled + 'px';
    }
  }

  scrollToTimeline(){
    const root = this.rootRef.current;
    const first = root && root.querySelector('[data-entry]');
    if(!first) return;
    const r = first.getBoundingClientRect();
    const top = window.scrollY + r.top - (window.innerHeight - r.height)/2;
    window.scrollTo({ top, behavior:'smooth' });
  }

  renderVals(){
    const accent = this.accent;
    const rows = [
      { y:2026, m:6, date:'June 2026', title:'Living in London — looking for software roles',
        bullets:['Settled in London and set up to work in the UK','Actively interviewing for backend & full-stack positions','Building side projects to stay sharp — including this site','Open to relocation across the UK & EU'] },
      { y:2026, m:4, date:'April 2026', title:'Leaves New Zealand, starts travelling Europe',
        bullets:['Wrapped up eight years of life and work in NZ','Backpacked through Italy, Spain & Portugal','Picked up freelance contracts remotely along the way','Reset priorities and planned the next chapter'] },
      { y:2026, m:3, date:'March 2026', title:'Leaves Gentrack',
        bullets:['Departed after 3+ years to travel and chase new challenges','Handed over ownership of two core billing services','Left on great terms — still in touch with the team'] },
      { y:2024, m:8, date:'August 2024', title:'Promoted to Intermediate Software Engineer',
        bullets:['Recognised for leading the move to event-driven architecture','Mentored two junior engineers on the team','Owned the payments integration end-to-end'] },
      { y:2023, m:1, date:'January 2023', title:'Joins Gentrack as Junior Software Engineer',
        bullets:['Joined the utilities billing platform team','Worked across Java, TypeScript & AWS','Shipped my first production feature in week three'] },
      { y:2021, m:11, date:'November 2021', title:'Graduates, starts at Dempsey Wood Civil as Junior Software Engineer',
        bullets:['Finished a degree in Computer Engineering','Built internal tooling for civil-works project tracking','First real taste of production software in a small team'] },
      { y:2018, m:2, date:'February 2018', title:'Starts at Canterbury University — Computer Engineering',
        bullets:['Began a Bachelor of Engineering (Hons)','Fell for systems and low-level programming','Balanced full-time study with part-time work'] },
    ];
    const dateBase = { font:'600 13px/1 ui-monospace, "SF Mono", Menlo, monospace', letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--accent)', marginBottom:'13px' };
    const yms = rows.map(d => d.y * 12 + d.m);
    const BASE = 400, SCALE = 95, EXP = 0.68;
    const entries = rows.map((d, i) => {
      const side = i % 2 === 0 ? 'left' : 'right';
      const gap = i < rows.length - 1 ? (yms[i] - yms[i+1]) : 0;
      const h = gap > 0 ? Math.round(BASE + SCALE * Math.pow(gap, EXP)) : 520;
      return {
        ...d,
        side,
        ym: yms[i],
        dateStyle: dateBase,
        rowStyle: { position:'relative', zIndex:2, display:'grid', gridTemplateColumns:'1fr 72px 1fr', alignItems:'start', paddingTop:'56px', height: h + 'px' },
        cellStyle: { gridColumn: side === 'left' ? '1' : '3', display:'flex', justifyContent: side === 'left' ? 'flex-end' : 'flex-start', position:'relative', zIndex:3 },
      };
    });
    return { rootRef: this.rootRef, accent, entries, scrollTo: () => this.scrollToTimeline() };
  }
}
</script>
</body>
</html>
